kind = "mobile"
previewPath = "/"
title = "RunWise Mobile"
version = "1.0.0"
id = "artifacts/runwise"
router = "expo-domain"

[[services]]
name = "expo"
ensurePreviewReachable = "/status"
paths = [ "/" ]
localPort = 25710

[services.development]
run = "pnpm --filter @workspace/runwise run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/runwise", "run", "build" ]
run = [ "pnpm", "--filter", "@workspace/runwise", "run", "serve" ]

[services.env]
PORT = "25710"
BASE_PATH = "/"
